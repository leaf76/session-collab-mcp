name: Bug report
description: Report incorrect behavior or a regression
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the sections below so maintainers can reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or MCP tool calls
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package / commit version
      placeholder: e.g. npm 0.1.0 or git sha
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Node version, MCP client (Codex/Claude/etc.)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell
